<!DOCTYPE html>
<html>
<head>
<title>To Do List</title>

<style>

body{
font-family:Arial;
background:#e3f2fd;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:20px;
border-radius:10px;
width:350px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

ul{
list-style:none;
padding:0;
}

li{
padding:10px;
margin:8px 0;
background:#f1f1f1;
border-radius:5px;
display:flex;
align-items:center;
}

input[type="checkbox"]{
margin-right:10px;
}

input[type="checkbox"]:checked + span{
text-decoration:line-through;
color:gray;
}

</style>
</head>

<body>

<div class="container">

<h2>My To Do List</h2>

<ul>

<li>
<input type="checkbox">
<span>Complete HTML assignment</span>
</li>

<li>
<input type="checkbox">
<span>Practice CSS</span>
</li>

<li>
<input type="checkbox">
<span>Upload project to GitHub</span>
</li>

<li>
<input type="checkbox">
<span>Prepare for coding interview</span>
</li>

</ul>

</div>

</body>
</html>
